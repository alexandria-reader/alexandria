name: Alexandria ci workflow
on: push

jobs:
  test-backend:
    runs-on: ubuntu-latest
    container: node:22-bookworm

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Connect to PostgreSQL
        run: node backend/client.js
        env:
          POSTGRES_HOST: postgres
          POSTGRES_PORT: 5432
          TEST_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres

      - name: Lint backend
        run: npm run lint --workspace=backend

      - name: Type-check backend
        run: npx tsc --noEmit --project backend/tsconfig.json

      - name: Run backend tests
        run: npm test --workspace=backend
        env:
          POSTGRES_HOST: postgres
          POSTGRES_PORT: 5432
          DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
          SECRET: test-jwt-secret

  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint --workspace=frontend

      - name: Type-check frontend
        run: npx tsc --noEmit --project frontend/tsconfig.json

      - name: Build frontend
        run: npm run build --workspace=frontend
